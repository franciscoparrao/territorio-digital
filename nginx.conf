events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Logging
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript
               application/x-javascript application/xml+rss
               application/javascript application/json;

    # Rate limiting
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;
    limit_req_zone $binary_remote_addr zone=general_limit:10m rate=50r/s;

    # DNS resolver for Docker
    resolver 127.0.0.11 valid=30s;

    # Upstream servers with variables to enable dynamic DNS resolution
    upstream frontend {
        server frontend:3000 max_fails=3 fail_timeout=30s;
    }

    upstream backend {
        server backend:3000 max_fails=3 fail_timeout=30s;
    }

    # HTTP redirect to HTTPS (always to non-www)
    server {
        listen 80;
        server_name territorio-digital.cl www.territorio-digital.cl;
        return 301 https://territorio-digital.cl$request_uri;
    }

    # Redirect www to non-www (HTTPS)
    server {
        listen 443 ssl http2;
        server_name www.territorio-digital.cl;

        ssl_certificate /etc/nginx/ssl/fullchain.pem;
        ssl_certificate_key /etc/nginx/ssl/privkey.pem;

        return 301 https://territorio-digital.cl$request_uri;
    }

    # Main server block with SSL (non-www only)
    server {
        listen 443 ssl http2;
        server_name territorio-digital.cl;

        # SSL configuration
        ssl_certificate /etc/nginx/ssl/fullchain.pem;
        ssl_certificate_key /etc/nginx/ssl/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 10m;

        # Security headers
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "no-referrer-when-downgrade" always;

        # API routes
        location /api/ {
            limit_req zone=api_limit burst=20 nodelay;

            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;

            # Timeouts
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        }

        # Frontend (SvelteKit)
        location / {
            limit_req zone=general_limit burst=100 nodelay;

            proxy_pass http://frontend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;

            # Cache static assets
            location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
                proxy_pass http://frontend;
                expires 1y;
                add_header Cache-Control "public, immutable";
            }
        }

        # Health check endpoint
        location /health {
            access_log off;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }
    }

    # ========================================================================
    # sanvicentetenisclub.cl — co-tenant en el mismo droplet.
    # Reutiliza las zonas de rate limit (api_limit, general_limit) y el
    # resolver Docker declarados arriba. Cert manejado por certbot del host
    # (deploy-hook copia los pem a ./ssl/club/ y reinicia el container).
    # Validar con `docker exec territorio-digital-nginx nginx -t` y luego
    # `docker exec territorio-digital-nginx nginx -s reload`.
    # ========================================================================

    upstream club_tenis_frontend {
        server club-tenis-frontend:80 max_fails=3 fail_timeout=30s;
    }

    upstream club_tenis_backend {
        server club-tenis-backend:3000 max_fails=3 fail_timeout=30s;
    }

    # HTTP → HTTPS
    server {
        listen 80;
        server_name sanvicentetenisclub.cl www.sanvicentetenisclub.cl;
        return 301 https://$server_name$request_uri;
    }

    # Main HTTPS
    server {
        listen 443 ssl http2;
        server_name sanvicentetenisclub.cl www.sanvicentetenisclub.cl;

        ssl_certificate     /etc/nginx/ssl/club/fullchain.pem;
        ssl_certificate_key /etc/nginx/ssl/club/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;
        ssl_session_cache   shared:SSLClub:10m;
        ssl_session_timeout 10m;

        # Headers de seguridad
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Frame-Options          "SAMEORIGIN" always;
        add_header X-Content-Type-Options   "nosniff"    always;
        add_header Referrer-Policy          "strict-origin-when-cross-origin" always;
        # CSP estricta. Permite Google Fonts (Sora) en style/font, todo lo demás
        # solo desde el origen propio.
        add_header Content-Security-Policy "default-src 'self'; img-src 'self' data:; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; script-src 'self' 'unsafe-inline'; connect-src 'self'; frame-ancestors 'self'; base-uri 'self'; form-action 'self'" always;

        # API
        location /api/ {
            limit_req zone=api_limit burst=20 nodelay;

            proxy_pass http://club_tenis_backend;
            proxy_http_version 1.1;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_connect_timeout 60s;
            proxy_send_timeout    60s;
            proxy_read_timeout    60s;
        }

        # Healthcheck (uptime monitor)
        location = /api/health {
            proxy_pass http://club_tenis_backend;
            access_log off;
        }

        # Frontend (build estático SvelteKit servido por nginx en el container club-tenis-frontend)
        location / {
            limit_req zone=general_limit burst=50 nodelay;

            proxy_pass http://club_tenis_frontend;
            proxy_http_version 1.1;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Logging separado
        access_log /var/log/nginx/club-tenis.access.log;
        error_log  /var/log/nginx/club-tenis.error.log;
    }
}
